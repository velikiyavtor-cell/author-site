<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости | Авторский сайт</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>📰 Новости</h1>
            <p class="subtitle">Что происходит в творческой мастерской</p>
        </div>
    </header>

    <nav>
        <div class="container">
            <a href="index.html">Главная</a>
            <a href="news.html">Новости</a>
            <a href="books.html">Книги</a>
            <a href="about.html">Об авторе</a>
            <a href="contact.html">Связь</a>
        </div>
    </nav>

    <main>
        <section class="container">
            <div id="news-list" class="news-list">
                <p>Загрузка новостей...</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Авторский сайт. Все права защищены.</p>
        </div>
    </footer>

    <script>
        // Простой парсер Markdown
        function parseMarkdown(text) {
            if (!text) return '';
            return text
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/gim, '<em>$1</em>')
                .replace(/\n/gim, '<br>');
        }

        // Форматирование даты
        function formatDate(dateString) {
            if (!dateString) return '';
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('ru-RU', options);
        }

        // Загрузка новостей из GitHub API
        async function loadNews() {
            const container = document.getElementById('news-list');
            
            try {
                // ЗАМЕНИ НА СВОЙ РЕПОЗИТОРИЙ!
                const repo = 'velikiyavtor-cell/author-site';
                
                const response = await fetch(`https://api.github.com/repos/${repo}/contents/content/news`);
                
                if (response.status === 404) {
                    container.innerHTML = '<p>Папка с новостями пока пуста. Будь первым!</p>';
                    return;
                }
                
                const files = await response.json();
                
                if (!Array.isArray(files) || files.length === 0) {
                    container.innerHTML = '<p>Новостей пока нет. Будь первым!</p>';
                    return;
                }

                // Сортируем: новые сверху
                files.sort((a, b) => b.name.localeCompare(a.name));

                container.innerHTML = '';
                
                for (const file of files) {
                    if (!file.name.endsWith('.md')) continue;
                    
                    // Получаем содержимое файла
                    const contentResp = await fetch(file.download_url);
                    const contentText = await contentResp.text();
                    
                    // Парсим YAML frontmatter
                    const frontmatter = {};
                    const lines = contentText.split('\n');
                    let inFrontmatter = false;
                    let bodyStart = 0;
                    
                    for (let i = 0; i < lines.length; i++) {
                        if (lines[i].trim() === '---') {
                            if (!inFrontmatter) {
                                inFrontmatter = true;
                                bodyStart = i + 1;
                            } else {
                                break;
                            }
                        } else if (inFrontmatter) {
                            const match = lines[i].match(/^(.*?):\s*(.*)$/);
                            if (match) {
                                frontmatter[match[1].trim()] = match[2].trim();
                            }
                        }
                    }
                    
                    const body = lines.slice(bodyStart + 1).join('\n').trim();
                    
                    // Создаём карточку новости
                    const article = document.createElement('article');
                    article.className = 'news-item';
                    article.innerHTML = `
                        <div class="news-date">${formatDate(frontmatter.date)}</div>
                        <h3>${frontmatter.title || 'Без заголовка'}</h3>
                        <div class="news-body">${parseMarkdown(body)}</div>
                    `;
                    container.appendChild(article);
                }
            } catch (error) {
                console.error('Ошибка загрузки новостей:', error);
                container.innerHTML = '<p>Не удалось загрузить новости. Попробуйте позже.</p>';
            }
        }

        // Загружаем при открытии страницы
        loadNews();
    </script>
</body>
</html>
